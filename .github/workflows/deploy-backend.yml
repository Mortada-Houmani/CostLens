name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/deploy-backend.yml

jobs:
  deploy-backend:
    name: Deploy Backend to ECS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_BACKEND_REPOSITORY: ${{ secrets.ECR_BACKEND_REPOSITORY }}
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
          ECS_TASK_DEFINITION: ${{ secrets.ECS_TASK_DEFINITION }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          missing=()

          [ -z "$AWS_ACCESS_KEY_ID" ] && missing+=("AWS_ACCESS_KEY_ID")
          [ -z "$AWS_SECRET_ACCESS_KEY" ] && missing+=("AWS_SECRET_ACCESS_KEY")
          [ -z "$AWS_REGION" ] && missing+=("AWS_REGION")
          [ -z "$ECR_BACKEND_REPOSITORY" ] && missing+=("ECR_BACKEND_REPOSITORY")
          [ -z "$ECS_CLUSTER" ] && missing+=("ECS_CLUSTER")
          [ -z "$ECS_SERVICE" ] && missing+=("ECS_SERVICE")
          [ -z "$ECS_TASK_DEFINITION" ] && missing+=("ECS_TASK_DEFINITION")
          [ -z "$JWT_SECRET" ] && missing+=("JWT_SECRET")

          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing required GitHub Secrets: %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push backend image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_BACKEND_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          LATEST_IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:latest"

          docker build -f backend/Dockerfile -t "$IMAGE_URI" -t "$LATEST_IMAGE_URI" backend
          docker push "$IMAGE_URI"
          docker push "$LATEST_IMAGE_URI"

          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ secrets.ECS_TASK_DEFINITION }}" \
            --query taskDefinition \
            > task-definition.json

      - name: Render ECS task definition
        id: render-task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: costlens-backend
          image: ${{ steps.build-image.outputs.image }}
          environment-variables: |
            JWT_SECRET=${{ secrets.JWT_SECRET }}

      - name: Deploy ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        timeout-minutes: 20
        with:
          task-definition: ${{ steps.render-task-definition.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true
