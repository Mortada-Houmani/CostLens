services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    expose:
      - "6379"

  backend:
    build:
      context: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      APP_ACCESS_TOKEN: ${APP_ACCESS_TOKEN}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
    ports:
      - "5173:80"
    depends_on:
      - backend
